<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:10px;
}

.search{
text-align:center;
margin-bottom:20px;
}

input{
width:90%;
font-size:22px;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
}

button{
margin-top:10px;
font-size:22px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#007bff;
color:white;
}

.card{
background:white;
padding:18px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.nama{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.info{
font-size:20px;
margin:4px 0;
}

</style>

<script>

function cari(){

let q = document.getElementById("q").value

fetch("https://omimlg.pagekite.me/cari?q="+q)

.then(res=>res.json())

.then(data=>{

let html=""

data.forEach(item=>{

html += "<div class='card'>"

html += "<div class='nama'>"+item.desk+"</div>"

html += "<div class='info'>PLU : "+item.pluomi+"</div>"
html += "<div class='info'>STOK : "+item.stok+"</div>"
html += "<div class='info'>FRACTION : "+item.karton+"</div>"
html += "<div class='info'>HPP : Rp "+item.hpp+"</div>"
html += "<div class='info'>TAG IGR : "+item.tag_igr+"</div>"
html += "<div class='info'>TAG OMI : "+item.tag_omi+"</div>"

html += "</div>"

})

document.getElementById("hasil").innerHTML=html

})

}

</script>

</head>

<body>

<div class="search">

<input type="text" id="q" placeholder="Masukkan PLU / Nama Barang">

<br>

<button onclick="cari()">CARI</button>

</div>

<div id="hasil"></div>

</body>

</html>
