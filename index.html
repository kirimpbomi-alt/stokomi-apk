<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.2">

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:10px;
}

h2{
font-size:26px;
text-align:center;
}

.search-box{
text-align:center;
margin-bottom:20px;
}

input{
width:80%;
font-size:22px;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

button{
font-size:22px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
font-size:20px;
background:white;
}

th{
background:#007bff;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<h2>CEK STOK BARANG</h2>

<div class="search-box">

<form action="/cari">

<input type="text" name="q" placeholder="Masukkan PLU atau Nama Barang">

<br><br>

<button type="submit">CARI</button>

</form>

</div>

</body>
</html>
